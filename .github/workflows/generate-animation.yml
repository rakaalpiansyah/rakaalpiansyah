name: Generate 3D Contribution

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - raka

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    permissions:
      contents: write
      
    steps:
      # Diperbarui ke versi 4 untuk mengatasi peringatan Node.js Deprecation
      - uses: actions/checkout@v4
      
      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        # Dipindahkan: Action ini membutuhkan USERNAME di dalam blok env, bukan with
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Update 3D Contribution Graph" || exit 0
          git push
